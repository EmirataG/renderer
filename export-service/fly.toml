# Required secrets (set via `fly secrets set`):
#   FIREBASE_ADMIN_PROJECT_ID
#   FIREBASE_ADMIN_CLIENT_EMAIL
#   FIREBASE_ADMIN_PRIVATE_KEY

app = "manuscript-export"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  PARALLEL_TABS = "8"
  MAX_BROWSERS = "2"
  # CORS_ORIGIN = "https://your-frontend-domain.com"  # Set when you have a production domain

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 1
    hard_limit = 2

[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[[vm]]
  size = "performance-4x"
  memory = "8gb"
